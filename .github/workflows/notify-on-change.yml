name: Notify On Student Data Change

on:
  push:
    branches:
      - main
    paths:
      - "docs/students.json"
      - "scripts/diff-and-notify.js"
      - "scripts/push-shared.js"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run change notifier
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/diff-and-notify.js

      - name: Commit notification state
        run: |
          if git diff --quiet docs/notification_state.json; then
            echo "No state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/notification_state.json
          git commit -m "chore: update notification state"
          git push
