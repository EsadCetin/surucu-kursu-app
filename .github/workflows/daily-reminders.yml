name: Daily Student Reminders

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run reminder notifier
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/daily-reminder-notify.js

      - name: Commit reminder state
        run: |
          if git diff --quiet docs/notification_state.json; then
            echo "No state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/notification_state.json
          git commit -m "chore: update reminder notification state"
          git push
